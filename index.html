function showToast(message, opts={}){
  const toast = document.getElementById("save-toast");
  if(!toast) return;
  toast.innerHTML = `<span>${esc(message)}</span>` + (opts.retry ? `<button id="toast-retry-btn">再試行</button>` : "");
  toast.classList.add("show");
  if(opts.retry){
    document.getElementById("toast-retry-btn").onclick = () => { hideToast(); opts.retry(); };
  }
  clearTimeout(toast._hideTimer);
  if(opts.autoHideMs){
    toast._hideTimer = setTimeout(hideToast, opts.autoHideMs);
  }
}
function hideToast(){
  const toast = document.getElementById("save-toast");
  if(toast) toast.classList.remove("show");
}

async function persistWithRetry(key, value, attempt=1){
  try{
    localStorage.setItem(key, JSON.stringify(value));
    if(attempt > 1) showToast("保存しました", { autoHideMs:1500 });
  }catch(e){
    console.error("storage error", e);
    if(attempt === 1){
      setTimeout(() => persistWithRetry(key, value, attempt+1), 500);
    } else if(attempt < 4){
      showToast("保存を再試行しています…", { autoHideMs:6000 });
      setTimeout(() => persistWithRetry(key, value, attempt+1), 800*attempt);
    } else {
      showToast("保存に失敗しました（ブラウザの空き容量・プライベートモードをご確認ください）", {
        retry: () => persistWithRetry(key, value, 1),
      });
    }
  }
}

function debSave(key, value){
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(() => persistWithRetry(key, value), 250);
}
function saveNow(key, value){
  persistWithRetry(key, value);
}

  try{
    const raw = localStorage.getItem(key);
    if(raw) return JSON.parse(raw);
  }catch(e){ /* not found or parse error */ }
  return fallback;
}

async function loadAll(){
  state.tasks = await loadKey(STORAGE_KEYS.tasks, DEFAULT_TASKS);
  state.budget = await loadKey(STORAGE_KEYS.budget, DEFAULT_BUDGET);
  state.zones = await loadKey(STORAGE_KEYS.zones, DEFAULT_ZONES);
  state.furniture = await loadKey(STORAGE_KEYS.furniture, DEFAULT_FURNITURE);
  const planSize = await loadKey(STORAGE_KEYS.planSize, {w:5000, h:5000});
  state.planWidth = planSize.w || 5000;
  state.planHeight = planSize.h || 5000;
  state.info = await loadKey(STORAGE_KEYS.info, DEFAULT_INFO);
  state.planLabels = await loadKey(STORAGE_KEYS.planLabels, DEFAULT_PLAN_LABELS);

  // 初期費用(物件)を1項目にまとめる
  const breakdownIds = ["b15","b16","b17","b18","b19","b20","b21","b22","b23","b24"];
  const hasOldBreakdown = state.budget.some(b => breakdownIds.slice(1).includes(b.id));
  if(hasOldBreakdown){
    const items = state.budget.filter(b => breakdownIds.includes(b.id));
    const sumMin = items.reduce((s,b)=>s+(Number(b.min)||0),0);
    const sumMax = items.reduce((s,b)=>s+(Number(b.max)||0),0);
    const sumActual = items.reduce((s,b)=>s+(Number(b.actual)||0),0);
    state.budget = state.budget.filter(b => !breakdownIds.includes(b.id));
    state.budget.push({ ...INITIAL_COST_ITEM, min:sumMin, max:sumMax, actual:sumActual });
    saveNow(STORAGE_KEYS.budget, state.budget);
  } else if(!state.budget.some(b => b.id === "b15")){
    state.budget = [...state.budget, INITIAL_COST_ITEM];
    saveNow(STORAGE_KEYS.budget, state.budget);
  }
  state.loaded = true;
}

const yen = (n) => (n === null || n === undefined || n === "" ? "-" : `¥${Number(n).toLocaleString()}`);
const clampNum = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + "T00:00:00");
  return Math.round((target - today) / 86400000);
}
function dueBadge(due){
  const d = daysUntil(due);
  if(d === null) return { text:"期限なし", color:COLORS.textSoft, bg:"transparent" };
  if(d < 0) return { text:`${-d}日超過`, color:"#fff", bg:COLORS.danger };
  if(d === 0) return { text:"本日まで", color:"#fff", bg:COLORS.danger };
  if(d <= 2) return { text:`あと${d}日`, color:"#fff", bg:COLORS.danger };
  if(d <= 7) return { text:`あと${d}日`, color:"#fff", bg:COLORS.warn };
  return { text:`あと${d}日`, color:COLORS.textSoft, bg:COLORS.surfaceDeep };
}

function renderTasks(){
  const total = state.tasks.length;

  const categories = [...new Set(state.tasks.map(t=>t.category))];

          <label>奥行 mm<input type="number" data-field="height" data-kind="furniture" data-id="${f.id}" value="${pctToMm(f.height,'y')}" /></label>
        </div>
        <div class="swatches">
          ${SWATCHES.map(c=>`<span class="swatch ${c===f.color?'selected':''}" style="background:${c};" data-action="set-furniture-color" data-id="${f.id}" data-color="${c}"></span>`).join("")}
        </div>
      </div>`;
    }).join("");

    const furniturePanel = t === "furniture" ? `
      <div class="edit-section" style="margin-top:8px;">
        <p class="muted" style="font-size:10px;margin:0 0 6px;">リスト上＝背面・下＝前面（ドラッグで並び替え）</p>
        ${furnitureCards}
        <button class="btn btn-primary" data-action="add-furniture">+ 家具を追加</button>
      </div>` : "";

    editPanels = `
      <div class="filter-chips" style="margin-top:8px;margin-bottom:0;">
        <button class="filter-chip ${t==='info'?'active':''}" data-action="set-layout-edit-tab" data-tab="info">基本情報</button>
        <button class="filter-chip ${t==='zone'?'active':''}" data-action="set-layout-edit-tab" data-tab="zone">部屋</button>
        <button class="filter-chip ${t==='furniture'?'active':''}" data-action="set-layout-edit-tab" data-tab="furniture">家具</button>
      </div>
      ${infoPanel}${zonePanel}${furniturePanel}
    `;
  }

  const legend = `<div class="furniture-legend">
    ${state.furniture.map(f=>`<div class="legend-item"><span class="legend-dot" style="background:${f.color};"></span><span>${esc(f.label)}</span></div>`).join("")}
  </div>`;

  const fpArea = `
    <div class="layout-note">
      <span class="muted">家具はいつでもドラッグ可能</span>
      <button class="edit-toggle" style="${editBtnStyle}" data-action="toggle-edit">${state.layoutEdit?'編集を終える':'間取りを編集'}</button>
    </div>
    <div class="fp-wrap">
      <div class="fp-mid">
        <span class="fp-edge-label" data-edge="top">${esc(state.planLabels.top)}</span>
        <div class="floor-plan" id="floor-plan">
          ${zoneBoxes}
          ${furnitureBoxes}
          <span class="fp-inner-label fp-inner-left" data-edge="left">${esc(state.planLabels.left)}</span>
          <span class="fp-inner-label fp-inner-right" data-edge="right">${esc(state.planLabels.right)}</span>
        </div>
        <span class="fp-edge-label" data-edge="bottom">${esc(state.planLabels.bottom)}</span>
      </div>
    </div>`;

  return state.layoutEdit
    ? `<div class="fp-sticky">${fpArea}</div>${legend}${editPanels}`
    : `${fpArea}${legend}`;
}

/* ====================== export / import ====================== */
function exportDataJSON(){
  return JSON.stringify({ tasks:state.tasks, budget:state.budget, zones:state.zones, furniture:state.furniture }, null, 2);
}
function importDataJSON(jsonStr){
  try{
    const obj = JSON.parse(jsonStr);
    if(Array.isArray(obj.tasks)) state.tasks = obj.tasks;
    if(Array.isArray(obj.budget)) state.budget = obj.budget;
    if(Array.isArray(obj.zones)) state.zones = obj.zones;
    if(Array.isArray(obj.furniture)) state.furniture = obj.furniture;
    saveNow(STORAGE_KEYS.tasks, state.tasks);
    saveNow(STORAGE_KEYS.budget, state.budget);
    saveNow(STORAGE_KEYS.zones, state.zones);
    saveNow(STORAGE_KEYS.furniture, state.furniture);
    render();
    showToast("データを読み込みました", { autoHideMs:2000 });
  }catch(e){
    showToast("JSONの形式が正しくないようです", { autoHideMs:4000 });
  }
}

function renderDataPanel(){
  const toggleLabel = state.dataPanelOpen ? "▲ データの書き出し・読み込みを閉じる" : "▼ データの書き出し・読み込み";
  const panel = state.dataPanelOpen ? `
    <div class="panel" style="margin-top:8px;">
      <p class="panel-title">書き出し（現在のデータをコピーして保管）</p>
      <textarea class="field" id="export-area" rows="5" readonly>${esc(exportDataJSON())}</textarea>
      <button class="btn btn-ghost" data-action="copy-export" style="margin-bottom:12px;">コピー</button>
      <p class="panel-title">読み込み（書き出したJSONを貼り付けて上書き）</p>
      <textarea class="field" id="import-area" rows="5" placeholder="ここにJSONを貼り付け"></textarea>
      <button class="btn btn-primary" data-action="import-data">読み込む（現在のデータを上書き）</button>
    </div>` : "";
  return `<div class="data-panel-toggle"><button class="link-btn" data-action="toggle-data-panel">${toggleLabel}</button></div>${panel}`;
}

/* ====================== main render ====================== */
function render(){
  const app = document.getElementById("app");
  if(!state.loaded){ app.innerHTML = `<div class="loading">読み込み中…</div>`; return; }
  let body = "";
  if(state.tab === "tasks") body = renderTasks();
  else if(state.tab === "budget") body = renderBudget();
  else if(state.tab === "info") body = renderInfo();
  else body = renderLayout();
  app.innerHTML = renderHeader() + body + renderDataPanel();
  if(state.tab === "layout") enableCanvasDrag();
}

/* ====================== reorder (drag & drop) ====================== */
function dragStart(e) {
  dragId = e.currentTarget.dataset.id;
  dragGroup = e.currentTarget.dataset.group;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}
function dragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e)   { e.currentTarget.classList.remove('dragging'); }
function drop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const tid = e.currentTarget.dataset.id, tg = e.currentTarget.dataset.group;
  if (!dragId || dragId === tid || dragGroup !== tg) return;
  const arr = _resolveArr(dragGroup);
  const si = arr.findIndex(x => x.id === dragId), ti = arr.findIndex(x => x.id === tid);
  if (si === -1 || ti === -1) { dragId = null; dragGroup = null; return; }
  const [item] = arr.splice(si, 1);
  arr.splice(ti, 0, item);
  _onSorted(dragGroup);
  dragId = null; dragGroup = null;
}
function _resolveArr(group) {
  if (group === 'tasks') return state.tasks;
  if (group === 'budget') return state.budget;
  if (group === 'furniture') return state.furniture;
  return [];
}
function _onSorted(group) {
  if (group === 'tasks') saveNow(STORAGE_KEYS.tasks, state.tasks);
  if (group === 'budget') saveNow(STORAGE_KEYS.budget, state.budget);
  if (group === 'furniture') saveNow(STORAGE_KEYS.furniture, state.furniture);
  render();
}

/* ====================== snap helper ====================== */
const SNAP_THRESHOLD = 3; // % of canvas

function snapToEdges(item, others, rawLeft, rawTop){
  const rR = rawLeft + item.width, rB = rawTop + item.height;
  let bL = rawLeft, bT = rawTop, mDx = SNAP_THRESHOLD, mDy = SNAP_THRESHOLD;

  const tryX = (delta, result) => { const d = Math.abs(delta); if(d < mDx){ mDx = d; bL = result; } };
  const tryY = (delta, result) => { const d = Math.abs(delta); if(d < mDy){ mDy = d; bT = result; } };

  // canvas edges
  tryX(rawLeft,    0);                    tryX(rR - 100, 100 - item.width);
  tryY(rawTop,     0);                    tryY(rB - 100, 100 - item.height);

  for(const o of others){
    if(o.id === item.id) continue;
    const oL = o.left, oR = o.left + o.width, oT = o.top, oB = o.top + o.height;
    tryX(rawLeft - oR, oR);               tryX(rawLeft - oL, oL);
    tryX(rR - oL, oL - item.width);       tryX(rR - oR, oR - item.width);
    tryY(rawTop  - oB, oB);               tryY(rawTop  - oT, oT);
    tryY(rB - oT, oT - item.height);      tryY(rB - oB, oB - item.height);
  }

  return {
    left: clampNum(bL, 0, 100 - item.width),
    top:  clampNum(bT, 0, 100 - item.height),
  };
}

/* ====================== canvas drag (zones + furniture move) ====================== */
function enableCanvasDrag(){
  const plan = document.getElementById("floor-plan");
  if(!plan) return;
  let drag = null; // { kind, id, el }

  const start = (e, kind, id, el) => {
    e.preventDefault();
    try{ el.setPointerCapture(e.pointerId); }catch(_e){}
    drag = { kind, id, el };
  };

  plan.querySelectorAll("[data-zone-drag]").forEach(el => {
    const id = el.getAttribute("data-zone-drag");
    if(!id) return;
    el.addEventListener("pointerdown", (e) => start(e, "zone", id, el));
  });
  plan.querySelectorAll("[data-furniture-drag]").forEach(el => {
    const id = el.getAttribute("data-furniture-drag");
    el.addEventListener("pointerdown", (e) => {
      if(e.target.closest(".furn-rotate-btn")) return;
      start(e, "furniture", id, el);
    });
  });

  plan.addEventListener("pointermove", (e) => {
    if(!drag) return;
    const rect = plan.getBoundingClientRect();
    const list = drag.kind === "zone" ? state.zones : state.furniture;
    const item = list.find(x=>x.id===drag.id);
    if(!item) return;
    let rawLeft = ((e.clientX - rect.left)/rect.width)*100 - item.width/2;
    let rawTop  = ((e.clientY - rect.top)/rect.height)*100 - item.height/2;
    rawLeft = clampNum(rawLeft, 0, 100 - item.width);
    rawTop  = clampNum(rawTop,  0, 100 - item.height);
    const snapItems = drag.kind === "zone" ? state.zones : [...state.zones, ...state.furniture];
    const { left: leftPct, top: topPct } = snapToEdges(item, snapItems, rawLeft, rawTop);
    drag.el.style.left = leftPct + "%";
    drag.el.style.top  = topPct  + "%";
    drag._live = { top: topPct, left: leftPct };
  });

  const finish = (e) => {
    if(!drag) return;
    if(drag._live){
      const list = drag.kind === "zone" ? state.zones : state.furniture;
      const item = list.find(x=>x.id===drag.id);
      if(item){ item.top = drag._live.top; item.left = drag._live.left; }
      const key = drag.kind === "zone" ? STORAGE_KEYS.zones : STORAGE_KEYS.furniture;
      saveNow(key, list);
    }
    try{ drag.el.releasePointerCapture(e.pointerId); }catch(_e){}
    drag = null;
  };
  plan.addEventListener("pointerup", finish);
  plan.addEventListener("pointercancel", finish);
}

/* ====================== event delegation (clicks / inputs) ====================== */
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if(action === "set-tab"){ state.tab = btn.dataset.tab; render(); }

  else if(action === "set-task-filter"){ state.taskFilter = btn.dataset.filter || null; render(); }
  else if(action === "set-budget-filter"){ state.budgetFilter = btn.dataset.filter || null; render(); }

  else if(action === "delete-task"){ state.tasks = state.tasks.filter(t=>t.id!==id); saveNow(STORAGE_KEYS.tasks, state.tasks); render(); }
  else if(action === "add-task"){
    const titleEl = document.getElementById("new-task-title");
    const catEl = document.getElementById("new-task-category");
    const dueEl = document.getElementById("new-task-due");
    const title = titleEl.value.trim();
    if(!title) return;
    state.tasks.push({ id:uid("t"), title, category:catEl.value, due: dueEl.value || null, done:false });
    saveNow(STORAGE_KEYS.tasks, state.tasks);
    render();
  }

  else if(action === "delete-budget"){ state.budget = state.budget.filter(b=>b.id!==id); saveNow(STORAGE_KEYS.budget, state.budget); render(); }
  else if(action === "add-budget"){
    state.budget.push({ id:uid("b"), category:"その他", item:"新しい項目", min:0, max:0, actual:null, status:"未購入" });
    saveNow(STORAGE_KEYS.budget, state.budget);
    render();
  }

  else if(action === "toggle-edit"){ state.layoutEdit = !state.layoutEdit; render(); }
  else if(action === "set-layout-edit-tab"){ state.layoutEditTab = btn.dataset.tab; render(); }
  else if(action === "save-layout-default"){
    localStorage.setItem(STORAGE_KEYS.layoutDefault, JSON.stringify({ zones: state.zones, furniture: state.furniture }));
    showToast("現在のレイアウトを初期値として保存しました", { autoHideMs:2000 });
  }
  else if(action === "reset-layout"){
    let def = null;
    try{ def = JSON.parse(localStorage.getItem(STORAGE_KEYS.layoutDefault)); }catch(_){}
    state.zones = JSON.parse(JSON.stringify(def?.zones || DEFAULT_ZONES));
    state.furniture = JSON.parse(JSON.stringify(def?.furniture || DEFAULT_FURNITURE));
    saveNow(STORAGE_KEYS.zones, state.zones); saveNow(STORAGE_KEYS.furniture, state.furniture); render();
  }
  else if(action === "delete-zone"){ state.zones = state.zones.filter(z=>z.id!==id); saveNow(STORAGE_KEYS.zones, state.zones); render(); }
  else if(action === "add-zone"){
    state.zones.push({ id:uid("z"), label:"新しい部屋", top:30, left:30, width:20, height:15, fill:COLORS.surface, z:0 });
    saveNow(STORAGE_KEYS.zones, state.zones);
    render();
  }
  else if(action === "delete-furniture"){ state.furniture = state.furniture.filter(f=>f.id!==id); saveNow(STORAGE_KEYS.furniture, state.furniture); render(); }
  else if(action === "add-furniture"){
    state.furniture.push({ id:uid("f"), label:"新しい家具", top:20, left:20, width:15, height:8, color:COLORS.accent, rotate:0, shape:"rect", front:"none" });
    saveNow(STORAGE_KEYS.furniture, state.furniture);
    render();
  }
  else if(action === "set-zone-color"){
    const z = state.zones.find(x=>x.id===id);
    if(z){ z.fill = btn.dataset.color; saveNow(STORAGE_KEYS.zones, state.zones); render(); }
  }
  else if(action === "set-furniture-color"){
    const f = state.furniture.find(x=>x.id===id);
    if(f){ f.color = btn.dataset.color; saveNow(STORAGE_KEYS.furniture, state.furniture); render(); }
  }
  else if(action === "set-furniture-shape"){
    const f = state.furniture.find(x=>x.id===id);
    if(f){ f.shape = btn.dataset.shape; saveNow(STORAGE_KEYS.furniture, state.furniture); render(); }
  }
  else if(action === "rotate-furniture"){
    const f = state.furniture.find(x=>x.id===id);
    if(f){ f.rotate = ((f.rotate||0) + 90) % 360; saveNow(STORAGE_KEYS.furniture, state.furniture); render(); }
  }
  else if(action === "apply-plan-size"){
    const w = Number(document.getElementById("plan-w").value) || 5000;
    const h = Number(document.getElementById("plan-h").value) || 5000;
    state.planWidth = w; state.planHeight = h;
    saveNow(STORAGE_KEYS.planSize, {w, h});
    render();
  }

  else if(action === "toggle-data-panel"){ state.dataPanelOpen = !state.dataPanelOpen; render(); }
  else if(action === "copy-export"){
    const ta = document.getElementById("export-area");
    if(!ta) return;
    ta.focus(); ta.select();
    try{ document.execCommand("copy"); showToast("コピーしました", { autoHideMs:1500 }); }
    catch(_e){ showToast("コピーできませんでした。手動で全選択してコピーしてください", { autoHideMs:3500 }); }
  }
  else if(action === "import-data"){
    const ta = document.getElementById("import-area");
    if(ta) importDataJSON(ta.value);
  }
});

document.addEventListener("change", (e) => {
  const t = e.target;
  if(t.id === "task-noop") return;
  if(t.dataset && t.dataset.action === "toggle-task"){
    const task = state.tasks.find(x=>x.id===t.dataset.id);
    if(task){ task.done = t.checked; saveNow(STORAGE_KEYS.tasks, state.tasks); render(); }
    return;
  }
  if(t.dataset && t.dataset.field && t.dataset.id && !t.dataset.kind){
    // budget field changes (status select triggers 'change'; number/text use 'input' below but also fires change)
    const b = state.budget.find(x=>x.id===t.dataset.id);
    if(b){
      const f = t.dataset.field;
      if(f === "status") b.status = t.value;
      saveNow(STORAGE_KEYS.budget, state.budget);
      if(f === "status") render();
    }
  }
});

document.addEventListener("input", (e) => {
  const t = e.target;
  if(!t.dataset) return;
  if(t.dataset.infoField !== undefined){
    state.info[t.dataset.infoField] = t.value;
    debSave(STORAGE_KEYS.info, state.info);
    return;
  }
  if(t.dataset.planLabel !== undefined){
    const edge = t.dataset.planLabel;
    state.planLabels[edge] = t.value;
    const compassEl = document.querySelector(`[data-edge="${edge}"]`);
    if(compassEl) compassEl.textContent = t.value;
    debSave(STORAGE_KEYS.planLabels, state.planLabels);
    return;
  }
  const id = t.dataset.id, field = t.dataset.field, kind = t.dataset.kind;
  if(!field || !id) return;

  if(kind === "zone"){
    const z = state.zones.find(x=>x.id===id);
    if(!z) return;
    if(field === "label"){
      z.label = t.value;
      const lbl = document.querySelector(`[data-zone-drag="${id}"] .zone-label`);
      if(lbl) lbl.textContent = t.value;
    } else {
      const axis = (field==='top'||field==='height') ? 'y' : 'x';
      z[field] = clampNum(mmToPct(Number(t.value)||0, axis), 0, 100);
      const box = document.querySelector(`[data-zone-drag="${id}"]`);
      if(box) box.style[field] = z[field] + "%";
    }
    debSave(STORAGE_KEYS.zones, state.zones);
    return;
  }
  if(kind === "furniture"){
    const f = state.furniture.find(x=>x.id===id);
    if(!f) return;
    if(field === "label"){
      f.label = t.value;
      const span = document.querySelector(`[data-furniture-drag="${id}"] span`);
      if(span) span.textContent = t.value;
    } else {
      const axis = field === 'height' ? 'y' : 'x';
      f[field] = clampNum(mmToPct(Number(t.value)||0, axis), 0, 100);
      const box = document.querySelector(`[data-furniture-drag="${id}"]`);
      if(box) box.style[field] = f[field] + "%";
    }
    debSave(STORAGE_KEYS.furniture, state.furniture);
    return;
  }

  // budget fields (no kind)
  const b = state.budget.find(x=>x.id===id);
  if(!b) return;
  if(field === "category" || field === "item"){ b[field] = t.value; }
  else if(field === "min" || field === "max"){ b[field] = t.value === "" ? 0 : Number(t.value); updateBudgetTotals(); }
  else if(field === "actual"){ b.actual = t.value === "" ? null : Number(t.value); updateBudgetTotals(); }
  debSave(STORAGE_KEYS.budget, state.budget);
});

function updateBudgetTotals(){
  const wrap = document.querySelector(".budget-summary");
  if(!wrap) return;
  const totalMax = state.budget.reduce((s,b)=>s+(Number(b.max)||0),0);
  const totalActual = state.budget.reduce((s,b)=>s+(Number(b.actual)||0),0);
  const actualCount = state.budget.filter(b=>b.actual!=null && b.actual!=="").length;
  const rows = wrap.querySelectorAll(".summary-row .val");
  if(rows[0]) rows[0].textContent = yen(totalMax);
  if(rows[1]) rows[1].textContent = yen(totalActual);
  const label = wrap.querySelectorAll(".summary-row span:first-child")[1];
  if(label) label.textContent = `実支出（入力済 ${actualCount}件）`;
}

/* ====================== init ====================== */
(async function init(){
  render();
  await loadAll();
  render();
})();
</script>
